<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>6th Grade STAAR Reading & Language Arts Practice Test</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Georgia,serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh}
  a{color:#1a5fa8}
  .page{max-width:960px;margin:0 auto;padding:2rem 1.25rem 4rem}
  .site-header{background:#1a3a6b;color:#fff;padding:0.75rem 1.25rem;text-align:center;font-size:13px;letter-spacing:.5px}
  .test-header{border:3px solid #1a1a1a;padding:1.25rem;margin-bottom:1.5rem;text-align:center;background:#fff}
  .test-header h1{font-size:20px;font-weight:700;letter-spacing:.5px;margin-bottom:4px}
  .test-header p{font-size:13px;color:#555}
  .badge-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:10px}
  .badge{font-size:11px;padding:3px 10px;border-radius:3px;font-family:Arial,sans-serif;font-weight:600;letter-spacing:.3px}
  .badge-blue{background:#ddeeff;color:#1a3a6b;border:1px solid #b0ccee}
  .badge-green{background:#dff2e8;color:#0a4a22;border:1px solid #a0d4b4}
  .badge-red{background:#fdecea;color:#8b1a1a;border:1px solid #f0b0a8}
  .dir-box{border:1px solid #bbb;padding:.75rem 1.1rem;margin-bottom:1.5rem;font-size:14px;color:#444;background:#fffef7;border-left:4px solid #1a3a6b;font-family:Arial,sans-serif}
  .dir-box strong{color:#1a1a1a}
  .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem}
  .stat-box{background:#fff;border:1px solid #ddd;border-radius:4px;padding:.75rem;text-align:center}
  .stat-n{font-size:24px;font-weight:700;color:#1a3a6b;font-family:Arial,sans-serif}
  .stat-l{font-size:11px;color:#888;margin-top:2px;font-family:Arial,sans-serif;text-transform:uppercase;letter-spacing:.4px}
  .prog-wrap{height:8px;background:#e0e0e0;border-radius:4px;margin-bottom:1.5rem;border:1px solid #ccc}
  .prog-bar{height:100%;background:#1a5fa8;border-radius:4px;width:0%;transition:width .4s}
  .section{margin-bottom:2.5rem}
  .sec-label{font-family:Arial,sans-serif;font-size:12px;font-weight:700;color:#1a3a6b;text-transform:uppercase;letter-spacing:.8px;border-bottom:2px solid #1a3a6b;padding-bottom:5px;margin-bottom:1rem}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;align-items:start}
  @media(max-width:680px){.two-col{grid-template-columns:1fr}.stats-row{grid-template-columns:repeat(2,1fr)}}
  .passage-box{border:1px solid #ccc;padding:1rem 1.1rem;border-radius:4px;background:#fff;border-top:4px solid #1a3a6b}
  .p-tag{display:inline-block;font-size:10px;font-weight:700;font-family:Arial,sans-serif;background:#ddeeff;color:#1a3a6b;border-radius:3px;padding:2px 8px;margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
  .p-title{font-size:15px;font-weight:700;text-align:center;color:#1a1a1a;margin-bottom:.75rem;border-bottom:1px solid #e0e0e0;padding-bottom:.5rem}
  .p-text{font-size:13.5px;line-height:1.9;color:#1a1a1a}
  .p-text p{margin-bottom:.55rem}
  .q-col{display:flex;flex-direction:column;gap:1rem}
  .q-block{border:1px solid #ddd;border-radius:4px;padding:.9rem 1rem;background:#fff}
  .q-num{font-size:11px;font-weight:700;font-family:Arial,sans-serif;color:#888;margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
  .q-text{font-size:14px;color:#1a1a1a;line-height:1.6;margin-bottom:.7rem}
  .choice{display:flex;align-items:flex-start;gap:8px;padding:6px 8px;border-radius:4px;cursor:pointer;font-size:13.5px;color:#1a1a1a;line-height:1.5;border:1px solid transparent;margin-bottom:4px;transition:background .1s;font-family:Arial,sans-serif}
  .choice:hover{background:#f0f4ff}
  .submit-area{text-align:center;margin-top:2rem}
  .sub-btn{padding:12px 40px;font-size:15px;font-weight:700;font-family:Arial,sans-serif;border-radius:4px;border:2px solid #1a3a6b;background:#1a3a6b;color:#fff;cursor:pointer;letter-spacing:.3px;transition:background .15s}
  .footer{text-align:center;font-size:12px;color:#888;font-family:Arial,sans-serif;margin-top:3rem;padding-top:1.5rem;border-top:1px solid #ddd}
</style>
</head>
<body>
<div class="site-header">6th Grade STAAR Reading & Language Arts &mdash; Practice Test</div>
<div class="page">
    <div class="test-header">
        <h1>STAAR Practice Test &mdash; Grade 6</h1>
        <p>Texas Essential Knowledge and Skills (TEKS) Aligned</p>
        <div class="badge-row">
            <span class="badge badge-blue">Practice Mode</span>
            <span class="badge badge-green">Instant Feedback</span>
        </div>
    </div>

    <div class="stats-row">
        <div class="stat-box"><div class="stat-n" id="s-ans">0</div><div class="stat-l">Answered</div></div>
        <div class="stat-box"><div class="stat-n" id="s-left">1</div><div class="stat-l">Remaining</div></div>
        <div class="stat-box"><div class="stat-n">1</div><div class="stat-l">Total</div></div>
    </div>

    <div id="test-body"></div>

    <div class="submit-area">
        <button class="sub-btn" onclick="submitTest()">Submit Answers</button>
        <div id="score-area"></div>
    </div>

    <div class="footer">Created for educational practice purposes.</div>
</div>

<script>
const passages = [
  {
    id: "p1",
    label: "Selection 1",
    tag: "Literary Fiction",
    title: "The Secret of the Salt Marshes",
    text: [
      "Maya had walked the edges of the salt marsh every summer for as long as she could remember. The twisted cordgrass rose taller than her waist now, and the mud beneath her boots made that familiar sucking sound with every step.",
      "\"Careful,\" her grandmother called from the wooden dock. \"The tide's coming in faster today.\"",
      "Maya glanced back and nodded. But she wasn't watching for the tide. She was watching the great blue heron that stood motionless at the water's edge.",
      "Today she moved differently. She slowed her breathing."
    ],
    questions: [
      {
        id: "q1",
        text: "Based on the passage, what is Maya's primary goal today?",
        options: {
          A: "To avoid the incoming tide",
          B: "To listen to her grandmother's stories",
          C: "To observe or photograph the heron",
          D: "To study the different types of marsh grass"
        },
        correct: "C"
      }
    ]
  }
];

function renderTest() {
    const container = document.getElementById('test-body');
    let html = '';
    passages.forEach(p => {
        html += `
        <div class="section">
            <div class="sec-label">${p.label}</div>
            <div class="two-col">
                <div class="passage-box">
                    <span class="p-tag">${p.tag}</span>
                    <div class="p-title">${p.title}</div>
                    <div class="p-text">${p.text.map(t => `<p>${t}</p>`).join('')}</div>
                </div>
                <div class="q-col">
                    ${p.questions.map(q => `
                        <div class="q-block">
                            <div class="q-num">Question</div>
                            <div class="q-text">${q.text}</div>
                            ${Object.entries(q.options).map(([key, val]) => `
                                <label class="choice">
                                    <input type="radio" name="${q.id}" value="${key}" onchange="updateStats()">
                                    ${key}. ${val}
                                </label>
                            `).join('')}
                        </div>
                    `).join('')}
                </div>
            </div>
        </div>`;
    });
    container.innerHTML = html;
}

function updateStats() {
    const answered = document.querySelectorAll('input[type="radio"]:checked').length;
    document.getElementById('s-ans').innerText = answered;
    document.getElementById('s-left').innerText = 1 - answered;
}

function submitTest() {
    alert("Great job! You have completed the practice question.");
}

renderTest();
</script>
</body>
</html>
